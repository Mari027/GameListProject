<div class="modal-overlay" (click)="close()">

    <!--Evitamos que el evento del padre se propague cuando clicamos el hijo-->
  <div class="modal" (click)="$event.stopPropagation()">

    <h1>Crea un juego</h1>

    <form [formGroup]="creationForm" (ngSubmit)="createNewGame()" class="game-form">

      <div class="form-group">
        <label>Título</label>
        <input type="text" formControlName="title" placeholder="Ej: The Legend of Zelda">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea rows="2" formControlName="description" placeholder="Breve sinopsis del juego..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Desarrolladora</label>
          <input type="text" formControlName="developer" placeholder="Ej: Nintendo">
        </div>

        <div class="form-group">
          <label>Fecha de Salida</label>
          <input type="date" formControlName="released">
        </div>
      </div>

      <div class="form-group">
        <label>Estado del juego</label>
        <select formControlName="gameStatus">
          <option value="" disabled selected>Selecciona estado</option>
          <option value="PLAYING">Jugando</option>
          <option value="COMPLETED">Completado</option>
          <option value="PAUSED">Pausado</option>
          <option value="DROPPED">Abandonado</option>
          <option value="PLAN_TO_PLAY">Pendiente</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Valoración</label>
          <input type="number" formControlName="rating" min="0" max="5" step="1" placeholder="0 - 5" />
        </div>

        <div class="form-group">
          <label>Horas jugadas</label>
          <input type="number" formControlName="hoursPlayed" min="0" step="0.1" placeholder="Ej: 15.5" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de inicio</label>
          <input type="date" formControlName="startedAt" />
        </div>

        <div class="form-group">
          <label>Fecha de finalización</label>
          <input type="date" formControlName="completedAt" />
        </div>
      </div>

      <div class="form-group">
        <label>Reseña</label>
        <textarea rows="3" formControlName="review" placeholder="Escribe tu opinión del juego"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="close()">
          Cancelar
        </button>
        <button type="submit" class="btn-submit" [disabled]="creationForm.invalid">
          Guardar juego
        </button>
      </div>

    </form>
  </div>
</div>
