<div class="confirm-container">
    <div class="confirm-box">
        <p>{{ message }}</p>
        <div class="confirm-actions">
            <button class="btn-cancel" (click)="onCancel.emit()">{{ cancelText }}</button>
            <button class="btn-confirm" (click)="onConfirm.emit()">{{ confirmText }}</button>
        </div>
    </div>
</div>
