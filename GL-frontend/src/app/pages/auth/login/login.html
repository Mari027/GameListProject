<div class="auth"> 
    
    <div id="login">
        <h2 class="login-title">Bienvenido!</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            
            <div class="form-group">
                <label>Email: *</label>
                <input type="email" formControlName="email" placeholder="tu@correo.com">
                
                @if(email.invalid && email.touched){
                    <p class="error">El email es obligatorio</p>
                }
            </div>

            <div class="form-group">
                <label>Contraseña: *</label>
                <input formControlName="password" type="password" placeholder="••••••••">
                
                @if(password.invalid && password.touched){
                    <p class="error">La contraseña es obligatoria</p>
                }
            </div>

            @if(errorMsg){
                <p class="error">{{errorMsg}}</p>
            }

            <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">Login</button>
        </form>

        <p class="link">
            ¿No te has registrado todavía? 
            <a [href]="['/register']">Regístrate</a>
        </p>
    </div>
</div>
