<app-navbar></app-navbar>

<div class="catalogo">

    <div class="cabecera">
        <h1>Tus Juegos</h1>
        <app-search-bar (search)="onSearchChange($event)"></app-search-bar>
    </div>

    @if(errorMsg){
    <p>{{errorMsg}}</p>
    }

    
    @if(isLoading){
    <p class="carga">Cargando juegos...</p>
    } @else {
    <div class="juegos-biblioteca">
        @for(game of gameList; track game.game.title; let i = $index){
        <div [style.background-image]="'url(' + game.game.coverImageUrl + ')'" class="game-card">

            <div class="texto">
                <h3>{{game.game.title}}</h3>

                <div class="botones-acciones">
                    <button class="btn-borrar" (click)="deleteGameFromList(game.game.id)" type="button"
                        title="Eliminar">
                        <img src="assets/icons/borrar.png" alt="Borrar">
                    </button>

                    <button class="btn-editar" (click)="selectGameToUpdate(game)" title="Editar">
                        <img src="assets/icons/boton-editar.png" alt="Editar">
                    </button>
                </div>
            </div>

        </div>
        }
    </div>
    }

    <button id="create" (click)="createGame()">
        <img src="assets/icons/add_game.png" alt="Añadir juego">
    </button>

    @if(isUpdateModalVisible){
    <app-update-game-modal [selectedGame]="selectedGame" (onClose)="isUpdateModalVisible = false"
        (onGameUpdated)="onGameUpdated()">
    </app-update-game-modal>
    }
    @if(isCreateModalVisible){
    <app-game-creation-modal (onClose)="isCreateModalVisible = false" (onGameCreated)="onGameCreated()">
    </app-game-creation-modal>
    }
</div>
