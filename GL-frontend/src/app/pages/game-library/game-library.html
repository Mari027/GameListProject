<app-navbar></app-navbar>
<div class="biblioteca">
    <h1>Tus Juegos</h1>

    @if(errorMsg){
        <p>{{errorMsg}}</p>
    }
    @if(isLoading){
        <p>Cargando...</p>
    } @else {
    <div class="juegos-biblioteca">
        @for(game of gameList; track game.game.title){
            <div [style.background-image]="'url(' + game.game.coverImageUrl + ')'" class="game-card">
                
                <h3>{{game.game.title}}</h3>
                <div>
                    <button (click)="selectGameToUpdate(game)">Editar</button>
                    <button (click)="deleteGameFromList(game.game.id)">Eliminar</button>
                </div>
            </div>
        }
    </div>
    }
    <button (click)="createGame()">Añadir Juego Desde 0</button>
    <!--Condicional para mostrar el modal y pasamos los datos entre hijo-padre y viceversa-->
    @if(isUpdateModalVisible){
        <app-update-game-modal
        [selectedGame]="selectedGame"
        (onClose)="isUpdateModalVisible = false"
        (onGameUpdated)="onGameUpdated()">
        </app-update-game-modal>
    }
    @if(isCreateModalVisible){
        <app-game-creation-modal
        (onClose)="isCreateModalVisible = false"
        (onGameCreated)="onGameCreated()">
        </app-game-creation-modal>
    }
</div>
